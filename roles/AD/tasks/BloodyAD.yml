
- name: BloodyAD - Check if already installed
  ansible.builtin.command: which bloodyAD
  register: bloodyad_check
  changed_when: false
  failed_when: false
  tags:
    - BloodyAD
    - AD

- name: BloodyAD - Install from apt (Kali)
  ansible.builtin.apt:
    name: bloodyad
    state: present
    update_cache: yes
    cache_valid_time: 3600
  when: 
    - vmware_env != "ubuntu"
    - bloodyad_check.rc != 0
  tags:
    - BloodyAD
    - AD

- name: BloodyAD - create project directory for {{ login_user }} (Ubuntu)
  ansible.builtin.file:
    path: "{{ login_home }}/bloodyad"
    state: directory
    owner: "{{ login_user }}"
    group: "{{ login_user }}"
    mode: "0755"
  when: 
    - vmware_env == "ubuntu"
    - bloodyad_check.rc != 0
  tags:
    - BloodyAD
    - AD

- name: BloodyAD - Ensure Python 3 is available (Ubuntu)
  ansible.builtin.apt:
    name: python3
    state: present
    update_cache: yes
    cache_valid_time: 3600
  when: 
    - vmware_env == "ubuntu"
    - bloodyad_check.rc != 0
  tags:
    - BloodyAD
    - AD

- name: BloodyAD - create Python virtualenv with uv (Ubuntu)
  ansible.builtin.command:
    argv:
      - uv
      - venv
      - "{{ login_home }}/bloodyad/venv"
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    creates: "{{ login_home }}/bloodyad/venv/bin/activate"
  when: 
    - vmware_env == "ubuntu"
    - bloodyad_check.rc != 0
  tags:
    - BloodyAD
    - AD

- name: BloodyAD - install bloodyAD in virtualenv with uv (Ubuntu)
  ansible.builtin.command:
    argv:
      - uv
      - pip
      - install
      - --python
      - "{{ login_home }}/bloodyad/venv/bin/python"
      - --upgrade
      - bloodyAD
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  when: 
    - vmware_env == "ubuntu"
    - bloodyad_check.rc != 0
  tags:
    - BloodyAD
    - AD

- name: BloodyAD - create global wrapper in /usr/local/bin (Ubuntu)
  ansible.builtin.file:
    src: "{{ login_home }}/bloodyad/venv/bin/bloodyAD"
    dest: /usr/local/bin/bloodyAD
    state: link
    force: yes
  when: 
    - vmware_env == "ubuntu"
    - bloodyad_check.rc != 0
  tags:
    - BloodyAD
    - AD

- name: BloodyAD - Verify installation
  ansible.builtin.command: bloodyAD --help
  register: bloodyad_help
  changed_when: false
  failed_when: false
  tags:
    - BloodyAD
    - AD

- name: BloodyAD - Show help output
  ansible.builtin.debug:
    msg: "{{ bloodyad_help.stdout_lines[0:5] | join('\n') }}"
  when: bloodyad_help.stdout is defined
  tags:
    - BloodyAD
    - AD
