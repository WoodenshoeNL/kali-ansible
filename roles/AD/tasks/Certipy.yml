
- name: certipy - create project directory for {{ login_user }} user
  file:
    path: "{{ login_home }}/certipy"
    state: directory
    owner: "{{ login_user }}"
    group: "{{ login_user }}"
    mode: "0755"
  tags:
    - certipy
    - AD

- name: certipy - create Python virtualenv with uv (runs as {{ login_user }})
  ansible.builtin.command:
    argv:
      - uv
      - venv
      - "{{ login_home }}/certipy/venv"
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    creates: "{{ login_home }}/certipy/venv/bin/activate"
  tags:
    - certipy
    - AD

- name: certipy - install certipy-ad in virtualenv with uv (runs as {{ login_user }})
  ansible.builtin.command:
    argv:
      - uv
      - pip
      - install
      - --python
      - "{{ login_home }}/certipy/venv/bin/python"
      - --upgrade
      - certipy-ad
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  tags:
    - certipy
    - AD

- name: certipy - create global wrapper in /usr/local/bin
  file:
    src: "{{ login_home }}/certipy/venv/bin/certipy"
    dest: /usr/local/bin/certipy-ad
    state: link
    force: yes
    follow: false
  tags:
    - certipy
    - AD
