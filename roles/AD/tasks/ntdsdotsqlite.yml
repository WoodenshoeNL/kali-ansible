
- name: ntdsdotsqlite - create project directory for "{{ login_user }}" user
  file:
    path: "{{ login_home }}/ntdsdotsqlite"
    state: directory
    owner: "{{ login_user }}"
    group: "{{ login_user }}"
    mode: "0755"
  tags:
    - ntdsdotsqlite
    - AD

- name: ntdsdotsqlite - create Python virtualenv with uv (runs as "{{ login_user }}")
  ansible.builtin.command:
    argv:
      - uv
      - venv
      - "{{ login_home }}/ntdsdotsqlite/venv"
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    creates: "{{ login_home }}/ntdsdotsqlite/venv/bin/activate"
  tags:
    - ntdsdotsqlite
    - AD

- name: ntdsdotsqlite - install ntdsdotsqlite and dissect.esedb in virtualenv with uv (runs as "{{ login_user }}")
  ansible.builtin.command:
    argv:
      - uv
      - pip
      - install
      - --python
      - "{{ login_home }}/ntdsdotsqlite/venv/bin/python"
      - --upgrade
      - ntdsdotsqlite
      - dissect.esedb
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  tags:
    - ntdsdotsqlite
    - AD

- name: ntdsdotsqlite - create global wrapper in /usr/local/bin
  file:
    src: "{{ login_home }}/ntdsdotsqlite/venv/bin/ntdsdotsqlite"
    dest: /usr/local/bin/ntdsdotsqlite
    state: link
    force: yes
  tags:
    - ntdsdotsqlite
    - AD
