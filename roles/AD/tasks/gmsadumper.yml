
- name: gmsadumper - create project directory for "{{ login_user }}" user
  file:
    path: "{{ login_home }}/gmsadumper"
    state: directory
    owner: "{{ login_user }}"
    group: "{{ login_user }}"
    mode: "0755"
  tags:
    - gmsadumper
    - AD

- name: gMSADumper – clone upstream repository
  ansible.builtin.git:
    repo: https://github.com/micahvandeusen/gMSADumper.git
    dest: "{{ login_home }}/gmsadumper"
    version: "HEAD"
    update: yes
    force: yes
  become_user: "{{ login_user }}"
  tags:
    - gmsadumper
    - AD

- name: gmsadumper - create Python virtualenv with uv (runs as "{{ login_user }}")
  ansible.builtin.command:
    argv:
      - uv
      - venv
      - "{{ login_home }}/gmsadumper/venv"
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    creates: "{{ login_home }}/gmsadumper/venv/bin/activate"
  tags:
    - gmsadumper
    - AD

- name: gMSADumper – install Python requirements into venv with uv
  ansible.builtin.command:
    argv:
      - uv
      - pip
      - install
      - --python
      - "{{ login_home }}/gmsadumper/venv/bin/python"
      - -r
      - "{{ login_home }}/gmsadumper/requirements.txt"
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    chdir: "{{ login_home }}/gmsadumper"
  tags:
    - gmsadumper
    - AD

- name: gMSADumper – create wrapper script in /usr/local/bin
  ansible.builtin.copy:
    dest: /usr/local/bin/gMSADumper
    mode: "0755"
    owner: root
    group: root
    content: |
      #!/usr/bin/env bash
      exec "{{ login_home }}"/gmsadumper/venv/bin/python "{{ login_home }}"/gmsadumper/gMSADumper.py "$@"
  tags:
    - gmsadumper
    - AD
