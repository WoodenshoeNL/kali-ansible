
- name: dploot - install packaged release (Kali)
  ansible.builtin.apt:
    name: python3-dploot
    state: present
    update_cache: yes
    cache_valid_time: 3600
  when: vmware_env != "ubuntu"
  tags:
    - dploot
    - AD

- name: dploot - install via uv (Ubuntu/Debian)
  ansible.builtin.command:
    argv:
      - uv
      - tool
      - install
      - --force
      - dploot
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  when: vmware_env == "ubuntu"
  tags:
    - dploot
    - AD
