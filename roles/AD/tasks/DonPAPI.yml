- name: DonPAPI - install python3-lxml system package
  become: yes
  ansible.builtin.apt:
    name:
      - python3-lxml
    state: present
  tags:
    - DonPAPI
    - AD

- name: DonPAPI - remove broken uv tool installation if exists
  ansible.builtin.command:
    argv:
      - uv
      - tool
      - uninstall
      - donpapi
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  register: uv_uninstall
  changed_when: uv_uninstall.rc == 0
  failed_when: false
  tags:
    - DonPAPI
    - AD

- name: DonPAPI - install DonPAPI via uv (with setuptools)
  ansible.builtin.command:
    argv:
      - uv
      - tool
      - install
      - --force
      - --with
      - setuptools
      - donpapi
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  tags:
    - DonPAPI
    - AD
