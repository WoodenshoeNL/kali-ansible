# uv - fast Python package installer and resolver (Astral)
# https://docs.astral.sh/uv/
# Use: uv run, uv pip, uv venv, uv python
# Installed via standalone script (no pip/pipx required).

- name: uv - Ensure curl is installed (required by installer script)
  ansible.builtin.apt:
    name: curl
    state: present
    update_cache: yes
    cache_valid_time: 3600
  tags:
    - uv
    - common

- name: uv - Download standalone installer
  ansible.builtin.get_url:
    url: https://astral.sh/uv/install.sh
    dest: /tmp/uv-install.sh
    mode: '0755'
  tags:
    - uv
    - common

- name: uv - Install uv via standalone installer (runs as {{ login_user }})
  ansible.builtin.shell: /tmp/uv-install.sh
  become: yes
  become_user: "{{ login_user }}"
  environment:
    HOME: "{{ login_home }}"
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  tags:
    - uv
    - common

- name: uv - Remove installer script
  ansible.builtin.file:
    path: /tmp/uv-install.sh
    state: absent
  tags:
    - uv
    - common
