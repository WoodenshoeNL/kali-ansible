
- name: impacket - Check if already installed
  ansible.builtin.command: which impacket-GetTGT
  register: impacket_check
  changed_when: false
  failed_when: false
  tags:
    - impacket
    - common

- name: impacket - create project directory for {{ login_user }}
  ansible.builtin.file:
    path: "{{ login_home }}/impacket"
    state: directory
    owner: "{{ login_user }}"
    group: "{{ login_user }}"
    mode: "0755"
  when: impacket_check.rc != 0
  tags:
    - impacket
    - common

- name: impacket - create Python virtualenv with uv
  ansible.builtin.command:
    argv:
      - uv
      - venv
      - "{{ login_home }}/impacket/venv"
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    creates: "{{ login_home }}/impacket/venv/bin/activate"
  when: impacket_check.rc != 0
  tags:
    - impacket
    - common

- name: impacket - install impacket in virtualenv with uv
  ansible.builtin.command:
    argv:
      - uv
      - pip
      - install
      - --python
      - "{{ login_home }}/impacket/venv/bin/python"
      - --upgrade
      - impacket
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  when: impacket_check.rc != 0
  tags:
    - impacket
    - common

- name: impacket - find installed scripts in venv
  ansible.builtin.find:
    paths: "{{ login_home }}/impacket/venv/bin"
    patterns: "impacket-*"
    file_type: file
  register: impacket_scripts
  when: impacket_check.rc != 0
  tags:
    - impacket
    - common

- name: impacket - create symlinks in /usr/local/bin
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "/usr/local/bin/{{ item.path | basename }}"
    state: link
    force: yes
  loop: "{{ impacket_scripts.files | default([]) }}"
  when:
    - impacket_check.rc != 0
    - impacket_scripts.files is defined
    - impacket_scripts.files | length > 0
  tags:
    - impacket
    - common

- name: impacket - Verify getTGT.py is available
  ansible.builtin.command: impacket-GetTGT --help
  register: impacket_getTGT
  changed_when: false
  failed_when: false
  tags:
    - impacket
    - common

- name: impacket - Verify getST.py is available
  ansible.builtin.command: impacket-GetST --help
  register: impacket_getST
  changed_when: false
  failed_when: false
  tags:
    - impacket
    - common

- name: impacket - Verify wmiexec.py is available
  ansible.builtin.command: impacket-wmiexec --help
  register: impacket_wmiexec
  changed_when: false
  failed_when: false
  tags:
    - impacket
    - common

- name: impacket - Verify secretsdump.py is available
  ansible.builtin.command: impacket-secretsdump --help
  register: impacket_secretsdump
  changed_when: false
  failed_when: false
  tags:
    - impacket
    - common

- name: impacket - Show verification results
  ansible.builtin.debug:
    msg: |
      getTGT.py: {{ 'Found' if impacket_getTGT.rc == 0 else 'Not found' }}
      getST.py: {{ 'Found' if impacket_getST.rc == 0 else 'Not found' }}
      wmiexec.py: {{ 'Found' if impacket_wmiexec.rc == 0 else 'Not found' }}
      secretsdump.py: {{ 'Found' if impacket_secretsdump.rc == 0 else 'Not found' }}
  tags:
    - impacket
    - common
