
- name: changedetection - install/upgrade changedetection.io via uv
  ansible.builtin.command:
    argv:
      - uv
      - tool
      - install
      - --upgrade
      - changedetection.io
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  tags:
    - changedetection
    - OSINT
