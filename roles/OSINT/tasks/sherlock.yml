
- name: sherlock - install/upgrade sherlock-project via uv
  ansible.builtin.command:
    argv:
      - uv
      - tool
      - install
      - --upgrade
      - sherlock-project
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  tags:
    - sherlock
    - OSINT
