
- name: spiderfoot - Install system dependencies for lxml
  apt:
    name:
      - libxml2-dev
      - libxslt1-dev
    state: present
    update_cache: yes
    cache_valid_time: 3600
  tags:
    - spiderfoot
    - OSINT

- name: spiderfoot - Ensure Programs directory exists
  become: yes
  become_user: "{{ login_user }}"
  file:
    path: "{{ login_home }}/Programs"
    state: directory
    mode: "0755"
  tags:
    - spiderfoot
    - OSINT

- name: spiderfoot - Clone spiderfoot repository
  become: yes
  become_user: "{{ login_user }}"
  git:
    repo: https://github.com/smicallef/spiderfoot.git
    dest: "{{ login_home }}/Programs/spiderfoot"
    update: yes
  tags:
    - spiderfoot
    - OSINT

- name: spiderfoot - Create virtual environment with uv
  become: yes
  become_user: "{{ login_user }}"
  ansible.builtin.command:
    argv:
      - uv
      - venv
      - "{{ login_home }}/Programs/spiderfoot/venv"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    creates: "{{ login_home }}/Programs/spiderfoot/venv"
  tags:
    - spiderfoot
    - OSINT

- name: spiderfoot - Install compatible lxml version (Python 3.13 fix) with uv
  become: yes
  become_user: "{{ login_user }}"
  ansible.builtin.command:
    argv:
      - uv
      - pip
      - install
      - --python
      - "{{ login_home }}/Programs/spiderfoot/venv/bin/python"
      - "lxml>=5.0"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  tags:
    - spiderfoot
    - OSINT

- name: spiderfoot - Install requirements in venv with uv (excluding lxml)
  become: yes
  become_user: "{{ login_user }}"
  ansible.builtin.shell: |
    grep -v '^lxml' requirements.txt | uv pip install --python "{{ login_home }}/Programs/spiderfoot/venv/bin/python" -r /dev/stdin
  args:
    chdir: "{{ login_home }}/Programs/spiderfoot"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  tags:
    - spiderfoot
    - OSINT
