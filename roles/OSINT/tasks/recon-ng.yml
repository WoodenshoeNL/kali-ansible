
- name: recon-ng - Ensure Programs directory exists
  become: yes
  become_user: "{{ login_user }}"
  file:
    path: "{{ login_home }}/Programs"
    state: directory
    mode: "0755"
  tags:
    - recon-ng
    - OSINT

- name: recon-ng - Clone recon-ng repository
  become: yes
  become_user: "{{ login_user }}"
  git:
    repo: https://github.com/lanmaster53/recon-ng.git
    dest: "{{ login_home }}/Programs/recon-ng"
    update: yes
  tags:
    - recon-ng
    - OSINT

- name: recon-ng - Create virtual environment with uv
  become: yes
  become_user: "{{ login_user }}"
  ansible.builtin.command:
    argv:
      - uv
      - venv
      - "{{ login_home }}/Programs/recon-ng/venv"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    creates: "{{ login_home }}/Programs/recon-ng/venv"
  tags:
    - recon-ng
    - OSINT

- name: recon-ng - Install requirements in venv with uv
  become: yes
  become_user: "{{ login_user }}"
  ansible.builtin.command:
    argv:
      - uv
      - pip
      - install
      - --python
      - "{{ login_home }}/Programs/recon-ng/venv/bin/python"
      - -r
      - "{{ login_home }}/Programs/recon-ng/REQUIREMENTS"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    chdir: "{{ login_home }}/Programs/recon-ng"
  tags:
    - recon-ng
    - OSINT
