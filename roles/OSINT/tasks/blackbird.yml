
- name: blackbird - Ensure Programs directory exists
  become: yes
  become_user: "{{ login_user }}"
  file:
    path: "{{ login_home }}/Programs"
    state: directory
    mode: "0755"
  tags:
    - blackbird
    - OSINT

- name: blackbird - Clone Blackbird repository
  become: yes
  become_user: "{{ login_user }}"
  git:
    repo: https://github.com/p1ngul1n0/blackbird.git
    dest: "{{ login_home }}/Programs/blackbird"
    update: yes
  tags:
    - blackbird
    - OSINT

- name: blackbird - Create virtual environment with uv
  become: yes
  become_user: "{{ login_user }}"
  ansible.builtin.command:
    argv:
      - uv
      - venv
      - "{{ login_home }}/Programs/blackbird/venv"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    creates: "{{ login_home }}/Programs/blackbird/venv"
  tags:
    - blackbird
    - OSINT

- name: blackbird - Install requirements in venv with uv
  become: yes
  become_user: "{{ login_user }}"
  ansible.builtin.command:
    argv:
      - uv
      - pip
      - install
      - --python
      - "{{ login_home }}/Programs/blackbird/venv/bin/python"
      - -r
      - "{{ login_home }}/Programs/blackbird/requirements.txt"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    chdir: "{{ login_home }}/Programs/blackbird"
  tags:
    - blackbird
    - OSINT
