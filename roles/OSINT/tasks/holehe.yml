
- name: holehe - install/upgrade holehe via uv
  ansible.builtin.command:
    argv:
      - uv
      - tool
      - install
      - --upgrade
      - holehe
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  tags:
    - holehe
    - OSINT
