
- name: carbon14 - Ensure Programs directory exists
  become: yes
  become_user: "{{ login_user }}"
  file:
    path: "{{ login_home }}/Programs"
    state: directory
    mode: "0755"
  tags:
    - carbon14
    - OSINT

- name: carbon14 - Clone Carbon14 repository
  become: yes
  become_user: "{{ login_user }}"
  git:
    repo: https://github.com/Lazza/Carbon14.git
    dest: "{{ login_home }}/Programs/Carbon14"
    update: yes
  tags:
    - carbon14
    - OSINT

- name: carbon14 - Create virtual environment with uv
  become: yes
  become_user: "{{ login_user }}"
  ansible.builtin.command:
    argv:
      - uv
      - venv
      - "{{ login_home }}/Programs/Carbon14/venv"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    creates: "{{ login_home }}/Programs/Carbon14/venv"
  tags:
    - carbon14
    - OSINT

- name: carbon14 - Install requirements in venv with uv
  become: yes
  become_user: "{{ login_user }}"
  ansible.builtin.command:
    argv:
      - uv
      - pip
      - install
      - --python
      - "{{ login_home }}/Programs/Carbon14/venv/bin/python"
      - -r
      - "{{ login_home }}/Programs/Carbon14/requirements.txt"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    chdir: "{{ login_home }}/Programs/Carbon14"
  tags:
    - carbon14
    - OSINT
