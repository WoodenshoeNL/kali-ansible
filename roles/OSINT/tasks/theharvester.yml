
- name: theharvester - install/upgrade theHarvester via uv from git
  ansible.builtin.command:
    argv:
      - uv
      - tool
      - install
      - --upgrade
      - "theHarvester @ git+https://github.com/laramies/theHarvester.git"
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  tags:
    - theharvester
    - OSINT
