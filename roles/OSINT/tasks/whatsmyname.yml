
- name: whatsmyname - Ensure Programs directory exists
  become: yes
  become_user: "{{ login_user }}"
  file:
    path: "{{ login_home }}/Programs"
    state: directory
    mode: "0755"
  tags:
    - whatsmyname
    - OSINT

- name: whatsmyname - Clone WhatsMyName-Python repository
  become: yes
  become_user: "{{ login_user }}"
  git:
    repo: https://github.com/C3n7ral051nt4g3ncy/WhatsMyName-Python.git
    dest: "{{ login_home }}/Programs/WhatsMyName-Python"
    update: yes
  tags:
    - whatsmyname
    - OSINT

- name: whatsmyname - Create virtual environment with uv
  become: yes
  become_user: "{{ login_user }}"
  ansible.builtin.command:
    argv:
      - uv
      - venv
      - "{{ login_home }}/Programs/WhatsMyName-Python/venv"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    creates: "{{ login_home }}/Programs/WhatsMyName-Python/venv"
  tags:
    - whatsmyname
    - OSINT

- name: whatsmyname - Install requirements in venv with uv
  become: yes
  become_user: "{{ login_user }}"
  ansible.builtin.command:
    argv:
      - uv
      - pip
      - install
      - --python
      - "{{ login_home }}/Programs/WhatsMyName-Python/venv/bin/python"
      - -r
      - "{{ login_home }}/Programs/WhatsMyName-Python/requirements.txt"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    chdir: "{{ login_home }}/Programs/WhatsMyName-Python"
  tags:
    - whatsmyname
    - OSINT
