
- name: maigret - install/upgrade maigret via uv
  ansible.builtin.command:
    argv:
      - uv
      - tool
      - install
      - --upgrade
      - maigret
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  tags:
    - maigret
    - OSINT
