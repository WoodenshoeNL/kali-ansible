
- name: meowEye - clone repository to /opt
  become: true
  ansible.builtin.git:
    repo: https://github.com/eslam3kl/meowEye.git
    dest: /opt/meowEye
    version: main
    force: yes
  tags:
    - meowEye
    - web

- name: meowEye - ensure chromium browser is installed
  become: true
  apt:
    name:
      - chromium
      - chromium-driver
    state: present
    update_cache: yes
    cache_valid_time: 3600
  tags:
    - meowEye
    - web

- name: meowEye - create virtual environment with uv
  become: true
  ansible.builtin.command:
    argv:
      - uv
      - venv
      - /opt/meowEye/venv
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    creates: /opt/meowEye/venv/bin/python
  tags:
    - meowEye
    - web

- name: meowEye - install requirements in venv with uv (packaging + setuptools<71 for seleniumwire)
  become: true
  ansible.builtin.command:
    argv:
      - uv
      - pip
      - install
      - --python
      - /opt/meowEye/venv/bin/python
      - -r
      - /opt/meowEye/requirements.txt
      - packaging
      - "setuptools<71"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    chdir: /opt/meowEye
  tags:
    - meowEye
    - web

- name: meowEye - create wrapper script
  become: true
  ansible.builtin.copy:
    dest: /usr/local/bin/meowEye
    mode: '0755'
    content: |
      #!/bin/bash
      cd /opt/meowEye
      /opt/meowEye/venv/bin/python /opt/meowEye/meowEye.py "$@"
  tags:
    - meowEye
    - web
