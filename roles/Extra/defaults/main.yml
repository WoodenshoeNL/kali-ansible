---
# Beads Rust (br) - Fast Rust port (default).
install_beads_rust: true

# Beads (original Python/Dolt version) - only install when explicitly requested.
# Set install_beads_original: true to install beads + Dolt + beads-mcp.
# See roles/Extra/README.md for details.
install_beads_original: false

# Optional Extra tools - only install when explicitly requested.
install_n8n: false
install_mullvad: false
install_torbrowser: false
install_terraform: false
