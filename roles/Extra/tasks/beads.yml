---
# Beads - distributed, git-backed graph issue tracker for AI agents
# https://github.com/steveyegge/beads
# Dolt - SQL database that works like Git (used with beads/bd)
# https://github.com/dolthub/dolt

- name: Beads - Ensure curl is installed
  ansible.builtin.apt:
    name: curl
    state: present
    update_cache: true
  tags:
    - beads_original

- name: Dolt - Install or update via official install script
  ansible.builtin.shell: |
    curl -L https://github.com/dolthub/dolt/releases/latest/download/install.sh | bash
  tags:
    - beads_original

- name: Beads - Install or update via official install script
  ansible.builtin.shell: |
    curl -fsSL https://raw.githubusercontent.com/steveyegge/beads/main/scripts/install.sh | bash
  tags:
    - beads_original

- name: Install beads-mcp for Cursor via uv
  ansible.builtin.command:
    argv:
      - uv
      - tool
      - install
      - --force
      - beads-mcp
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  tags:
    - beads_original
