
- name: 1Password - Install required dependencies
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
    state: present
    update_cache: yes
  tags:
    - 1password
    - extra

- name: 1Password - Download GPG key
  ansible.builtin.get_url:
    url: https://downloads.1password.com/linux/keys/1password.asc
    dest: /tmp/1password-keyring.asc
    mode: '0644'
  tags:
    - 1password
    - extra

- name: 1Password - Dearmor and install GPG key
  ansible.builtin.shell: |
    gpg --dearmor < /tmp/1password-keyring.asc > /usr/share/keyrings/1password-archive-keyring.gpg
  args:
    executable: /bin/bash
    creates: /usr/share/keyrings/1password-archive-keyring.gpg
  tags:
    - 1password
    - extra

- name: 1Password - Add APT repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/amd64 stable main"
    filename: 1password
    state: present
  tags:
    - 1password
    - extra

- name: 1Password - Install package
  ansible.builtin.apt:
    name: 1password
    state: present
    update_cache: yes
  tags:
    - 1password
    - extra

- name: 1Password - Clean up temporary key file
  ansible.builtin.file:
    path: /tmp/1password-keyring.asc
    state: absent
  tags:
    - 1password
    - extra
