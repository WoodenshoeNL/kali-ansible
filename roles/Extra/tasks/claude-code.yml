# Uses official install script: https://code.claude.com/docs/en/quickstart
# Native install gets automatic background updates from Anthropic.

- name: Claude Code - Check if Claude Code is installed
  ansible.builtin.shell: command -v claude
  register: claude_code_check
  changed_when: false
  failed_when: false
  become_user: "{{ login_user }}"
  tags:
    - claude_code
    - AI

- name: Claude Code - Install via official script (Linux/macOS/WSL)
  ansible.builtin.shell: |
    curl -fsSL https://claude.ai/install.sh | bash
  args:
    creates: "{{ login_home }}/.local/bin/claude"
  environment:
    HOME: "{{ login_home }}"
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('/usr/local/bin:/usr/bin:/bin') }}"
  become_user: "{{ login_user }}"
  when: claude_code_check.rc != 0
  tags:
    - claude_code
    - AI

- name: Claude Code - Ensure PATH includes ~/.local/bin in .bashrc
  ansible.builtin.lineinfile:
    path: "{{ login_home }}/.bashrc"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    regexp: '.*\.local/bin.*PATH'
    state: present
  become_user: "{{ login_user }}"
  tags:
    - claude_code
    - AI