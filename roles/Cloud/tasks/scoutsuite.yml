
- name: scoutsuite - create project directory for "{{ login_user }}" user
  file:
    path: "{{ login_home }}/scoutsuite"
    state: directory
    owner: "{{ login_user }}"
    group: "{{ login_user }}"
    mode: "0755"
  tags:
    - scoutsuite
    - cloud

- name: scoutsuite - create Python virtualenv with uv (runs as "{{ login_user }}")
  ansible.builtin.command:
    argv:
      - uv
      - venv
      - "{{ login_home }}/scoutsuite/venv"
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    creates: "{{ login_home }}/scoutsuite/venv/bin/activate"
  tags:
    - scoutsuite
    - cloud

- name: scoutsuite - install scoutsuite in virtualenv with uv (runs as "{{ login_user }}")
  ansible.builtin.command:
    argv:
      - uv
      - pip
      - install
      - --python
      - "{{ login_home }}/scoutsuite/venv/bin/python"
      - --upgrade
      - scoutsuite
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  tags:
    - scoutsuite
    - cloud

- name: scoutsuite - create global wrapper in /usr/local/bin
  file:
    src: "{{ login_home }}/scoutsuite/venv/bin/scout"
    dest: /usr/local/bin/scout
    state: link
    force: yes                 # overwrite if link already exists
  tags:
    - scoutsuite
    - cloud
