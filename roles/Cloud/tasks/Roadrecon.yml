
- name: roadrecon - create project directory for "{{ login_user }}" user
  file:
    path: "{{ login_home }}/roadrecon"
    state: directory
    owner: "{{ login_user }}"
    group: "{{ login_user }}"
    mode: "0755"
  tags:
    - roadrecon
    - cloud

- name: roadrecon - create Python virtualenv with uv (runs as "{{ login_user }}")
  ansible.builtin.command:
    argv:
      - uv
      - venv
      - "{{ login_home }}/roadrecon/venv"
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    creates: "{{ login_home }}/roadrecon/venv/bin/activate"
  tags:
    - roadrecon
    - cloud

- name: roadrecon - install Roadrecon in virtualenv with uv (runs as "{{ login_user }}")
  ansible.builtin.command:
    argv:
      - uv
      - pip
      - install
      - --python
      - "{{ login_home }}/roadrecon/venv/bin/python"
      - --upgrade
      - roadrecon
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  tags:
    - roadrecon
    - cloud

- name: roadrecon - create global wrapper in /usr/local/bin
  file:
    src: "{{ login_home }}/roadrecon/venv/bin/roadrecon"
    dest: /usr/local/bin/roadrecon
    state: link
    force: yes                 # overwrite if link already exists
  tags:
    - roadrecon
    - cloud
