- name: SeamlessPass - install via uv tool (runs as "{{ login_user }}")
  ansible.builtin.command:
    argv:
      - uv
      - tool
      - install
      - --reinstall
      - seamlesspass
      - --with
      - setuptools
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
    UV_TOOL_BIN_DIR: "{{ login_home }}/.local/bin"
  register: seamlesspass_install
  changed_when: >
    seamlesspass_install.rc == 0 and
    ('Installed' in seamlesspass_install.stdout or
     'installed' in seamlesspass_install.stdout)
  tags:
    - seamlesspass
    - cloud

- name: SeamlessPass - create global wrapper in /usr/local/bin
  file:
    src: "{{ login_home }}/.local/bin/seamlesspass"
    dest: /usr/local/bin/seamlesspass
    state: link
    force: yes
  tags:
    - seamlesspass
    - cloud