- name: SeamlessPass - install via uv tool (runs as "{{ login_user }}")
  ansible.builtin.shell:
    cmd: "{{ login_home }}/.local/bin/uv tool install --reinstall seamlesspass"
  become: yes
  become_user: "{{ login_user }}"
  environment:
    HOME: "{{ login_home }}"
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
    UV_TOOL_BIN_DIR: "{{ login_home }}/.local/bin"
  changed_when: true
  tags:
    - seamlesspass
    - cloud

- name: SeamlessPass - inject setuptools into uv tool venv (for pkg_resources)
  ansible.builtin.shell:
    cmd: "{{ login_home }}/.local/share/uv/tools/seamlesspass/bin/pip install --upgrade setuptools"
  become: yes
  become_user: "{{ login_user }}"
  environment:
    HOME: "{{ login_home }}"
  changed_when: true
  tags:
    - seamlesspass
    - cloud

- name: SeamlessPass - create global wrapper in /usr/local/bin
  file:
    src: "{{ login_home }}/.local/bin/seamlesspass"
    dest: /usr/local/bin/seamlesspass
    state: link
    force: yes
  tags:
    - seamlesspass
    - cloud