
- name: roadtx - create project directory for "{{ login_user }}" user
  file:
    path: "{{ login_home }}/roadtx"
    state: directory
    owner: "{{ login_user }}"
    group: "{{ login_user }}"
    mode: "0755"
  tags:
    - roadtx
    - cloud

- name: roadtx - create Python virtualenv with uv (runs as "{{ login_user }}")
  ansible.builtin.command:
    argv:
      - uv
      - venv
      - "{{ login_home }}/roadtx/venv"
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  args:
    creates: "{{ login_home }}/roadtx/venv/bin/activate"
  tags:
    - roadtx
    - cloud

- name: roadtx - install roadtx in virtualenv with uv (runs as "{{ login_user }}")
  ansible.builtin.command:
    argv:
      - uv
      - pip
      - install
      - --python
      - "{{ login_home }}/roadtx/venv/bin/python"
      - --upgrade
      - roadtx
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  tags:
    - roadtx
    - cloud

- name: roadtx - create global wrapper in /usr/local/bin
  file:
    src: "{{ login_home }}/roadtx/venv/bin/roadtx"
    dest: /usr/local/bin/roadtx
    state: link
    force: yes                 # overwrite if link already exists
  tags:
    - roadtx
    - cloud
