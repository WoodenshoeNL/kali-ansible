- name: enum4linux-ng - install package (Kali)
  ansible.builtin.apt:
    name: enum4linux-ng
    state: present
    update_cache: yes
    cache_valid_time: 3600
  when: vmware_env != "ubuntu"
  tags:
    - enum4linux-ng
    - network

- name: enum4linux-ng - install dependencies (Ubuntu)
  ansible.builtin.apt:
    name:
      - git
      - smbclient
    state: present
    update_cache: yes
    cache_valid_time: 3600
  when: vmware_env == "ubuntu"
  tags:
    - enum4linux-ng
    - network

- name: enum4linux-ng - install via uv from git (Ubuntu)
  ansible.builtin.command:
    argv:
      - uv
      - tool
      - install
      - "enum4linux-ng @ git+https://github.com/cddmp/enum4linux-ng.git"
  become: yes
  become_user: "{{ login_user }}"
  environment:
    PATH: "{{ login_home }}/.local/bin:{{ ansible_env.PATH | default('') }}"
  when: vmware_env == "ubuntu"
  tags:
    - enum4linux-ng
    - network
