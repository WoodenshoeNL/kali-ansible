- name: hashcat - Check if hashcat is installed
  ansible.builtin.command: which hashcat
  register: hashcat_installed
  changed_when: false
  failed_when: false
  tags:
    - hashcat
    - network

- name: hashcat - Get current version
  ansible.builtin.command: hashcat --version
  register: hashcat_version_check
  changed_when: false
  failed_when: false
  when: hashcat_installed.rc == 0
  tags:
    - hashcat
    - network

- name: hashcat - Parse version and check if update needed
  ansible.builtin.set_fact:
    hashcat_current_version: "{{ hashcat_version_check.stdout | regex_search('v([0-9]+\\.[0-9]+\\.[0-9]+)', '\\1') | first | default('0.0.0') }}"
  when: hashcat_version_check is defined and hashcat_version_check.stdout is defined
  tags:
    - hashcat
    - network

- name: hashcat - Compare version with 7.1.2 using dpkg
  ansible.builtin.shell: |
    if [ -z "{{ hashcat_current_version | default('0.0.0') }}" ] || [ "{{ hashcat_current_version | default('0.0.0') }}" = "0.0.0" ]; then
      echo "needs_update"
    elif dpkg --compare-versions "{{ hashcat_current_version | default('0.0.0') }}" lt "7.1.2"; then
      echo "needs_update"
    else
      echo "ok"
    fi
  register: hashcat_version_comparison
  changed_when: false
  failed_when: false
  when: hashcat_version_check is defined
  tags:
    - hashcat
    - network

- name: hashcat - Set needs update based on comparison
  ansible.builtin.set_fact:
    hashcat_needs_update: "{{ hashcat_version_comparison.stdout == 'needs_update' }}"
  when: hashcat_version_comparison is defined
  tags:
    - hashcat
    - network

- name: hashcat - Set needs update to true if not installed
  ansible.builtin.set_fact:
    hashcat_needs_update: true
  when: hashcat_installed.rc != 0
  tags:
    - hashcat
    - network

- name: hashcat - install/upgrade hashcat package
  ansible.builtin.apt:
    name: hashcat
    state: latest
    update_cache: yes
    cache_valid_time: 3600
  when: hashcat_needs_update | default(true)
  register: hashcat_apt_install
  tags:
    - hashcat
    - network

- name: hashcat - Check version after apt install/upgrade
  ansible.builtin.command: hashcat --version
  register: hashcat_version_after_apt
  changed_when: false
  failed_when: false
  when: hashcat_needs_update | default(true)
  tags:
    - hashcat
    - network

- name: hashcat - Parse version after apt install
  ansible.builtin.set_fact:
    hashcat_version_after_apt_parsed: "{{ hashcat_version_after_apt.stdout | default('') | regex_search('v([0-9]+\\.[0-9]+\\.[0-9]+)', '\\1') | first | default('0.0.0') }}"
    hashcat_still_needs_update: false
  when: 
    - hashcat_needs_update | default(true)
    - hashcat_version_after_apt is defined
    - hashcat_version_after_apt.stdout is defined
  tags:
    - hashcat
    - network

- name: hashcat - Compare version after apt install with 7.1.2
  ansible.builtin.shell: |
    if dpkg --compare-versions "{{ hashcat_version_after_apt_parsed | default('0.0.0') }}" lt "7.1.2"; then
      echo "needs_update"
    else
      echo "ok"
    fi
  register: hashcat_version_after_apt_comparison
  changed_when: false
  failed_when: false
  when: 
    - hashcat_needs_update | default(true)
    - hashcat_version_after_apt_parsed is defined
  tags:
    - hashcat
    - network

- name: hashcat - Update still needs update flag based on comparison
  ansible.builtin.set_fact:
    hashcat_still_needs_update: "{{ hashcat_version_after_apt_comparison.stdout | default('ok') == 'needs_update' }}"
  when: 
    - hashcat_needs_update | default(true)
    - hashcat_version_after_apt_comparison is defined
  tags:
    - hashcat
    - network

- name: hashcat - Check if OpenCL data dir exists (needed when binary is from GitHub)
  ansible.builtin.stat:
    path: /usr/local/share/hashcat/OpenCL
  register: hashcat_opencl_stat
  tags:
    - hashcat
    - network

- name: hashcat - Set needs data dir when OpenCL missing (e.g. re-run after binary-only install)
  ansible.builtin.set_fact:
    hashcat_needs_data_dir: "{{ not (hashcat_opencl_stat.stat.exists | default(false)) }}"
  tags:
    - hashcat
    - network

- name: hashcat - Set do GitHub fetch (version update OR data dir missing)
  ansible.builtin.set_fact:
    hashcat_do_github_fetch: "{{ (hashcat_still_needs_update | default(false)) or (hashcat_needs_data_dir | default(false)) }}"
  tags:
    - hashcat
    - network

- name: hashcat - Get latest release from GitHub (if apt version too old or data dir missing)
  ansible.builtin.uri:
    url: https://api.github.com/repos/hashcat/hashcat/releases/latest
    return_content: yes
    follow_redirects: all
  register: hashcat_github_release
  when: hashcat_do_github_fetch | default(false)
  tags:
    - hashcat
    - network

- name: hashcat - Find release asset from GitHub (.7z or Linux zip/tar.gz)
  ansible.builtin.set_fact:
    hashcat_github_asset: "{{ (hashcat_github_release.json.assets | default([]) | selectattr('name', 'search', '(hashcat-.*\\.7z|linux.*amd64|linux.*x86_64|.*linux.*\\.(zip|tar\\.gz))') | list | map(attribute='browser_download_url') | first) | default('') }}"
  when: 
    - hashcat_do_github_fetch | default(false)
    - hashcat_github_release.json.assets is defined
  tags:
    - hashcat
    - network

- name: hashcat - Install p7zip for .7z extraction (GitHub release is 7z)
  ansible.builtin.apt:
    name: p7zip-full
    state: present
    update_cache: yes
    cache_valid_time: 3600
  when: 
    - hashcat_do_github_fetch | default(false)
    - hashcat_github_asset is defined
    - hashcat_github_asset != ""
  tags:
    - hashcat
    - network

- name: hashcat - Download from GitHub release
  ansible.builtin.get_url:
    url: "{{ hashcat_github_asset }}"
    dest: /tmp/hashcat_download
    mode: "0644"
    force: no
  when: 
    - hashcat_do_github_fetch | default(false)
    - hashcat_github_asset is defined
    - hashcat_github_asset != ""
  tags:
    - hashcat
    - network

- name: hashcat - Extract GitHub release (.7z or zip/tar.gz)
  ansible.builtin.shell: |
    mkdir -p /tmp/hashcat_extract
    case "{{ hashcat_github_asset }}" in
      *.7z)  7z x /tmp/hashcat_download -o/tmp/hashcat_extract -y ;;
      *)     tar -xaf /tmp/hashcat_download -C /tmp/hashcat_extract ;;
    esac
  args:
    creates: /tmp/hashcat_extract
  when: 
    - hashcat_do_github_fetch | default(false)
    - hashcat_github_asset is defined
    - hashcat_github_asset != ""
  tags:
    - hashcat
    - network

- name: hashcat - Find extracted hashcat binary path (main binary preferred over .bin)
  ansible.builtin.shell: |
    P=$(find /tmp/hashcat_extract -type f -name 'hashcat' 2>/dev/null | head -1)
    [ -n "$P" ] && echo "$P" || find /tmp/hashcat_extract -type f -name 'hashcat.bin' 2>/dev/null | head -1
  register: hashcat_binary_path_cmd
  changed_when: false
  when: 
    - hashcat_do_github_fetch | default(false)
    - hashcat_github_asset is defined
    - hashcat_github_asset != ""
  tags:
    - hashcat
    - network

- name: hashcat - Install hashcat data (OpenCL, etc.) to /usr/local/share/hashcat
  ansible.builtin.shell: |
    install -d /usr/local/share/hashcat
    SRC=$(find /tmp/hashcat_extract -maxdepth 1 -mindepth 1 -type d | head -1)
    cp -r "$SRC"/* /usr/local/share/hashcat/
  when: 
    - hashcat_do_github_fetch | default(false)
    - hashcat_github_asset is defined
    - hashcat_github_asset != ""
  tags:
    - hashcat
    - network

- name: hashcat - Copy GitHub binary to /usr/local/bin
  ansible.builtin.copy:
    src: "{{ hashcat_binary_path_cmd.stdout }}"
    dest: /usr/local/bin/hashcat
    mode: "0755"
    owner: root
    group: root
    remote_src: yes
  when: 
    - hashcat_still_needs_update | default(false)
    - hashcat_binary_path_cmd.stdout is defined
    - hashcat_binary_path_cmd.stdout | length > 0
  register: hashcat_github_copy
  tags:
    - hashcat
    - network

- name: hashcat - Remove apt package when GitHub binary was installed (so correct version is used)
  ansible.builtin.apt:
    name: hashcat
    state: absent
  when: hashcat_github_copy is changed | default(false)
  tags:
    - hashcat
    - network

- name: hashcat - Remove outdated user cache (dictstat2 etc.) so v7.x does not warn
  ansible.builtin.file:
    path: "{{ login_home }}/.local/share/hashcat"
    state: absent
  when: hashcat_do_github_fetch | default(false)
  tags:
    - hashcat
    - network

- name: hashcat - Cleanup GitHub download files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/hashcat_download
    - /tmp/hashcat_extract
  when: hashcat_do_github_fetch | default(false)
  tags:
    - hashcat
    - network

- name: hashcat - install hashcat-utils package (Kali)
  ansible.builtin.apt:
    name: hashcat-utils
    state: latest
  when: vmware_env != "ubuntu"
  tags:
    - hashcat
    - network

- name: hashcat - install build dependencies (Ubuntu)
  ansible.builtin.apt:
    name:
      - git
      - make
      - gcc
    state: present
  when: vmware_env == "ubuntu"
  tags:
    - hashcat
    - network

- name: hashcat - clone hashcat-utils repo (Ubuntu)
  ansible.builtin.git:
    repo: https://github.com/hashcat/hashcat-utils.git
    dest: /opt/hashcat-utils
    version: master
  when: vmware_env == "ubuntu"
  tags:
    - hashcat
    - network

- name: hashcat - build hashcat-utils (Ubuntu)
  ansible.builtin.shell:
    cmd: make
    chdir: /opt/hashcat-utils
    creates: /opt/hashcat-utils/bin/cap2hccapx.bin
  when: vmware_env == "ubuntu"
  tags:
    - hashcat
    - network

- name: hashcat - find built binaries (Ubuntu)
  ansible.builtin.find:
    paths: /opt/hashcat-utils/bin
    patterns: "*.bin"
  register: hashcat_utils_binaries
  when: vmware_env == "ubuntu"
  tags:
    - hashcat
    - network

- name: hashcat - symlink hashcat-utils binaries (Ubuntu)
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "/usr/local/bin/{{ item.path | basename | regex_replace('\\.bin$', '') }}"
    state: link
  loop: "{{ hashcat_utils_binaries.files }}"
  when: vmware_env == "ubuntu"
  tags:
    - hashcat
    - network

- name: hashcat - Verify version after installation/update
  ansible.builtin.command: hashcat --version
  register: hashcat_final_version
  changed_when: false
  tags:
    - hashcat
    - network

- name: hashcat - Show installed version
  ansible.builtin.debug:
    msg: "{{ hashcat_final_version.stdout }}"
  when: hashcat_final_version.stdout is defined
  tags:
    - hashcat
    - network